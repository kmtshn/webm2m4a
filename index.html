<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebM → M4A 変換ツール</title>
  <link rel="icon" href="data:,">

  <!-- ★ これが GitHub Pages で SharedArrayBuffer を有効化する鍵 -->
  <script src="coi-serviceworker.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .env-check {
      text-align: center;
      font-size: 0.8rem;
      margin-bottom: 24px;
      padding: 8px;
      border-radius: 8px;
    }
    .env-check.ok   { color: #4ade80; background: rgba(74,222,128,0.1); }
    .env-check.fail { color: #f87171; background: rgba(248,113,113,0.1); }
    .env-check.wait { color: #fbbf24; background: rgba(251,191,36,0.1); }

    .drop-zone {
      border: 2px dashed #475569;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.05);
    }

    .drop-zone p { color: #94a3b8; font-size: 0.95rem; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .file-name {
      color: #60a5fa;
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-align: center;
      min-height: 1.2em;
    }

    .settings {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .settings label { font-size: 0.85rem; color: #94a3b8; }

    .settings select {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.85rem;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    #convertBtn { background: #3b82f6; color: white; }
    #convertBtn:hover:not(:disabled) { background: #2563eb; }

    button:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    .progress-container {
      margin-top: 20px;
      display: none;
    }

    .progress-bar-bg {
      background: #334155;
      border-radius: 8px;
      overflow: hidden;
      height: 8px;
    }

    .progress-bar {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
      border-radius: 8px;
    }

    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #94a3b8;
      word-break: break-all;
    }
    .status.success { color: #4ade80; }
    .status.error   { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebM → M4A 変換</h1>
    <p class="subtitle">ブラウザ上で完結。ファイルはサーバーに送信されません。</p>
    <div class="env-check" id="envCheck"></div>

    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <p>クリックまたはD&Dで .webm を選択</p>
    </div>
    <input type="file" id="fileInput" accept=".webm" hidden>

    <div class="file-name" id="fileName"></div>

    <div class="settings">
      <label for="bitrate">ビットレート:</label>
      <select id="bitrate">
        <option value="128k">128 kbps</option>
        <option value="192k" selected>192 kbps</option>
        <option value="256k">256 kbps</option>
        <option value="320k">320 kbps</option>
      </select>
    </div>

    <button id="convertBtn" disabled>変換する</button>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

  <script>
    (function () {
      var dropZone    = document.getElementById('dropZone');
      var fileInput   = document.getElementById('fileInput');
      var fileNameEl  = document.getElementById('fileName');
      var convertBtn  = document.getElementById('convertBtn');
      var progressContainer = document.getElementById('progressContainer');
      var progressBar = document.getElementById('progressBar');
      var statusEl    = document.getElementById('status');
      var bitrateEl   = document.getElementById('bitrate');
      var envCheckEl  = document.getElementById('envCheck');

      // ====== 環境チェック ======
      function checkEnv() {
        var sabSupported = typeof SharedArrayBuffer !== 'undefined';
        var coiEnabled   = window.crossOriginIsolated === true;

        if (sabSupported && coiEnabled) {
          envCheckEl.textContent = '✓ 環境OK（Cross-Origin Isolated）';
          envCheckEl.className = 'env-check ok';
          return true;
        } else if (sabSupported) {
          envCheckEl.textContent = '✓ 環境OK（SharedArrayBuffer 有効）';
          envCheckEl.className = 'env-check ok';
          return true;
        } else {
          envCheckEl.innerHTML = '⏳ Service Worker 準備中… 自動リロードされます';
          envCheckEl.className = 'env-check wait';
          return false;
        }
      }

      var envReady = checkEnv();

      var selectedFile = null;
      var ffmpegLoaded = false;

      var ffmpeg = FFmpeg.createFFmpeg({
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
      });

      ffmpeg.setProgress(function (ev) {
        if (ev.ratio >= 0 && ev.ratio <= 1) {
          var pct = Math.round(ev.ratio * 100);
          progressBar.style.width = Math.max(30, pct) + '%';
        }
      });

      // ====== ファイル選択 ======
      function handleFile(file) {
        if (!file || !file.name.toLowerCase().endsWith('.webm')) {
          fileNameEl.textContent = '⚠ .webm ファイルを選択してください';
          selectedFile = null;
          convertBtn.disabled = true;
          return;
        }
        selectedFile = file;
        fileNameEl.textContent = '📄 ' + file.name + '（' + (file.size / 1024 / 1024).toFixed(2) + ' MB）';
        convertBtn.disabled = !envReady;
      }

      dropZone.addEventListener('click', function () { fileInput.click(); });
      dropZone.addEventListener('dragover', function (e) {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', function () {
        dropZone.classList.remove('dragover');
      });
      dropZone.addEventListener('drop', function (e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', function () {
        handleFile(fileInput.files[0]);
      });

      // ====== 変換 ======
      convertBtn.addEventListener('click', async function () {
        if (!selectedFile) return;

        convertBtn.disabled = true;
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        statusEl.className = 'status';

        try {
          if (!ffmpegLoaded) {
            statusEl.textContent = 'FFmpeg を読み込み中…（初回のみ・約25MB）';
            progressBar.style.width = '10%';
            await ffmpeg.load();
            ffmpegLoaded = true;
          }

          statusEl.textContent = 'ファイルを読み込み中…';
          progressBar.style.width = '20%';

          var arrayBuf = await selectedFile.arrayBuffer();
          ffmpeg.FS('writeFile', 'input.webm', new Uint8Array(arrayBuf));

          statusEl.textContent = '変換中…（しばらくお待ちください）';
          progressBar.style.width = '30%';

          var bitrate = bitrateEl.value;
          await ffmpeg.run(
            '-i', 'input.webm',
            '-vn',
            '-c:a', 'aac',
            '-b:a', bitrate,
            'output.m4a'
          );

          progressBar.style.width = '90%';
          statusEl.textContent = 'ダウンロード準備中…';

          var data = ffmpeg.FS('readFile', 'output.m4a');
          var blob = new Blob([data.buffer], { type: 'audio/mp4' });
          var url = URL.createObjectURL(blob);

          var a = document.createElement('a');
          a.href = url;
          a.download = selectedFile.name.replace(/\.webm$/i, '.m4a');
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          ffmpeg.FS('unlink', 'input.webm');
          ffmpeg.FS('unlink', 'output.m4a');

          progressBar.style.width = '100%';
          statusEl.className = 'status success';
          statusEl.textContent = '変換完了！ダウンロードが開始されました。';
        } catch (err) {
          console.error(err);
          statusEl.className = 'status error';
          statusEl.textContent = 'エラー: ' + err.message;
        } finally {
          convertBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
